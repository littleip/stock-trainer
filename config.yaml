# 盘感训练器配置文件

# 通达信数据目录 (修改为你的实际路径)
tongdaxin_dir: "E:/tdx/vipdoc"

# 训练参数
train_days: 120          # 每次训练的K线天数（可自定义：10~500）
display_window: 120     # 屏幕固定显示的K线根数（通达信风格滑动窗口）
rsi_period: 6           # RSI参数

# 买入理由库
buy_reasons:
  - "RSI超卖(<20)"
  - "放量上涨"
  - "突破前高"
  - "回踩支撑"
  - "均线多头"
  - "底部阳线缩量"
  - "直觉盘感"
  - "其他"

# 卖出理由库
sell_reasons:
  - "RSI超买(>80)"
  - "放量滞涨"
  - "触及压力位"
  - "跌破支撑"
  - "止损(-5%)"
  - "止盈达标"
  - "直觉盘感"
  - "其他"
